name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test, UI test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Prepare local SQLite database
        run: npm run db:push
        env:
          DATABASE_URL: file:./dev.db

      - name: Unit tests
        run: npm test
        env:
          DATABASE_URL: file:./dev.db

      - name: UI tests
        run: npm run test:ui
        env:
          DATABASE_URL: file:./dev.db

      - name: Production build
        run: npm run build
        env:
          DATABASE_URL: file:./dev.db

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
